<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUGAR - Modern Transportation App</title>
</head>
<body style="margin: 0; padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;">
    
    <div style="text-align: center; padding: 40px; max-width: 600px;">
        <!-- Logo Section -->
        <div style="margin-bottom: 2rem;">
            <img src="./images/lugar-logo.jpeg" 
                 alt="LUGAR Logo" 
                 style="width: 300px; height: 300px; border-radius: 24px; box-shadow: 0 8px 32px rgba(255, 191, 0, 0.3); margin-bottom: 1rem;">
        </div>
        
        <h1 style="color: #FFBF00; font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem; text-shadow: 0 2px 8px rgba(255, 191, 0, 0.4); letter-spacing: 2px;">
            LUGAR
        </h1>
        
        <p style="color: rgba(255,255,255,0.8); font-size: 1.2rem; margin-bottom: 0.5rem; font-weight: 500;">
            Transportation Made Simple
        </p>
        
        <p style="color: rgba(255,255,255,0.6); font-size: 1rem; margin-bottom: 3rem; max-width: 500px; line-height: 1.6;">
            Experience our interactive design prototype. Discover how modern transportation connects communities with seamless, user-friendly design.
        </p>
        
        <a href="https://www.figma.com/proto/2CJlDIBlwLUDd8COzjKf0Y/LUGAR?page-id=0%3A1&node-id=1-1225&viewport=1757%2C28%2C0.99&t=1zEjTsjYR7UGBYIX-1&scaling=scale-down&content-scaling=fixed&starting-point-node-id=1%3A1225" 
           style="
               display: inline-flex;
               align-items: center;
               justify-content: center;
               padding: 18px 36px;
               background: linear-gradient(135deg, #FFBF00, #FFD700);
               color: #1a1a1a;
               text-decoration: none;
               border-radius: 50px;
               font-weight: 700;
               font-size: 1.1rem;
               letter-spacing: 0.5px;
               box-shadow: 0 8px 25px rgba(255, 191, 0, 0.4);
               transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
               position: relative;
               overflow: hidden;
               min-width: 220px;
               border: 2px solid rgba(255, 191, 0, 0.3);
               text-transform: uppercase;
           "
           onmouseover="this.style.transform='translateY(-4px) scale(1.02)'; this.style.boxShadow='0 15px 40px rgba(255, 191, 0, 0.6)'; this.style.background='linear-gradient(135deg, #FFD700, #FFF200)';"
           onmouseout="this.style.transform='translateY(0) scale(1)'; this.style.boxShadow='0 8px 25px rgba(255, 191, 0, 0.4)'; this.style.background='linear-gradient(135deg, #FFBF00, #FFD700)';"
           onmousedown="this.style.transform='translateY(-2px) scale(0.98)'; this.style.boxShadow='0 6px 20px rgba(255, 191, 0, 0.5)';"
           onmouseup="this.style.transform='translateY(-4px) scale(1.02)'; this.style.boxShadow='0 15px 40px rgba(255, 191, 0, 0.6)';">
            
            <svg style="width: 22px; height: 22px; margin-right: 10px; fill: currentColor;" viewBox="0 0 24 24">
                <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z" />
            </svg>
            
            View Prototype
            
            <svg style="width: 18px; height: 18px; margin-left: 10px; fill: currentColor;" viewBox="0 0 24 24">
                <path d="M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z" />
            </svg>
        </a>
        
        <div style="margin-top: 3rem; padding: 24px; background: rgba(255, 191, 0, 0.1); border-radius: 16px; border: 1px solid rgba(255, 191, 0, 0.2);">
            <div style="display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;">
                <div style="text-align: center;">
                    <div style="font-size: 1.5rem; margin-bottom: 0.5rem;">🚌</div>
                    <p style="color: #FFBF00; font-weight: 600; margin: 0; font-size: 0.9rem;">Smart Routes</p>
                </div>
                <div style="text-align: center;">
                    <div style="font-size: 1.5rem; margin-bottom: 0.5rem;">📱</div>
                    <p style="color: #FFBF00; font-weight: 600; margin: 0; font-size: 0.9rem;">Mobile First</p>
                </div>
                <div style="text-align: center;">
                    <div style="font-size: 1.5rem; margin-bottom: 0.5rem;">⚡</div>
                    <p style="color: #FFBF00; font-weight: 600; margin: 0; font-size: 0.9rem;">Real-time</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Floating background elements with golden theme -->
    <div style="position: absolute; top: 15%; left: 8%; width: 80px; height: 80px; background: rgba(255, 191, 0, 0.1); border-radius: 50%; animation: float 6s ease-in-out infinite;"></div>
    <div style="position: absolute; top: 60%; right: 10%; width: 60px; height: 60px; background: rgba(255, 191, 0, 0.08); border-radius: 50%; animation: float 8s ease-in-out infinite reverse;"></div>
    <div style="position: absolute; bottom: 20%; left: 15%; width: 40px; height: 40px; background: rgba(255, 191, 0, 0.12); border-radius: 50%; animation: float 10s ease-in-out infinite;"></div>
    
    <!-- Subtle grid pattern overlay -->
    <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(circle at 1px 1px, rgba(255, 191, 0, 0.05) 1px, transparent 0); background-size: 40px 40px; pointer-events: none;"></div>
    
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(180deg); }
        }
        
        @media (max-width: 768px) {
            body > div {
                padding: 20px !important;
            }
            h1 {
                font-size: 2.5rem !important;
            }
            .feature-grid {
                gap: 1rem !important;
            }
        }
        
        /* Subtle glow effect for the logo */
        img {
            animation: logoGlow 4s ease-in-out infinite alternate;
        }
        
        @keyframes logoGlow {
            0% { box-shadow: 0 8px 32px rgba(255, 191, 0, 0.3); }
            100% { box-shadow: 0 8px 32px rgba(255, 191, 0, 0.5), 0 0 20px rgba(255, 191, 0, 0.2); }
        }
    </style>
</body>
</html>
