<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Figma Prototype Button</title>
</head>
<body style="margin: 0; padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;">
    
    <div style="text-align: center; padding: 40px;">
        <h1 style="color: white; font-size: 2.5rem; font-weight: 700; margin-bottom: 1rem; text-shadow: 0 2px 4px rgba(0,0,0,0.3);">
            LUGAR Prototype
        </h1>
        <p style="color: rgba(255,255,255,0.9); font-size: 1.1rem; margin-bottom: 2rem; max-width: 500px;">
            Experience our interactive design prototype. Click below to explore the full user journey.
        </p>
        
        <a href="https://www.figma.com/proto/2CJlDIBlwLUDd8COzjKf0Y/LUGAR?page-id=0%3A1&node-id=1-1225&viewport=1757%2C28%2C0.99&t=1zEjTsjYR7UGBYIX-1&scaling=scale-down&content-scaling=fixed&starting-point-node-id=1%3A1225" 
           style="
               display: inline-flex;
               align-items: center;
               justify-content: center;
               padding: 16px 32px;
               background: linear-gradient(135deg, #ff6b6b, #ee5a24);
               color: white;
               text-decoration: none;
               border-radius: 50px;
               font-weight: 600;
               font-size: 1.1rem;
               letter-spacing: 0.5px;
               box-shadow: 0 8px 25px rgba(238, 90, 36, 0.4);
               transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
               position: relative;
               overflow: hidden;
               min-width: 200px;
               border: 2px solid rgba(255,255,255,0.2);
           "
           onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 12px 35px rgba(238, 90, 36, 0.6)'; this.style.background='linear-gradient(135deg, #ff7979, #fd79a8)';"
           onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 8px 25px rgba(238, 90, 36, 0.4)'; this.style.background='linear-gradient(135deg, #ff6b6b, #ee5a24)';"
           onmousedown="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 6px 20px rgba(238, 90, 36, 0.5)';"
           onmouseup="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 12px 35px rgba(238, 90, 36, 0.6)';">
            
            <svg style="width: 20px; height: 20px; margin-right: 8px; fill: currentColor;" viewBox="0 0 24 24">
                <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z" />
            </svg>
            
            View Prototype
            
            <svg style="width: 16px; height: 16px; margin-left: 8px; fill: currentColor;" viewBox="0 0 24 24">
                <path d="M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z" />
            </svg>
        </a>
        
        <div style="margin-top: 2rem;">
            <p style="color: rgba(255,255,255,0.7); font-size: 0.9rem;">
                🎨 Interactive Design • 📱 Mobile Optimized • ⚡ Fast Loading
            </p>
        </div>
    </div>
    
    <!-- Floating background elements for visual interest -->
    <div style="position: absolute; top: 10%; left: 10%; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; animation: float 6s ease-in-out infinite;"></div>
    <div style="position: absolute; top: 70%; right: 15%; width: 60px; height: 60px; background: rgba(255,255,255,0.08); border-radius: 50%; animation: float 8s ease-in-out infinite reverse;"></div>
    
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        @media (max-width: 768px) {
            body > div {
                padding: 20px !important;
            }
            h1 {
                font-size: 2rem !important;
            }
        }
    </style>
</body>
</html>
